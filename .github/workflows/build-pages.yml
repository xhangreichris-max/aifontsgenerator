name: Build Sub-Pages

on:
  push:
    paths:
      - 'pages-config.json'
      - 'template.html'
      - 'build.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Build pages
        run: python build.py

      - name: Commit generated pages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.html
          git diff --staged --quiet || git commit -m "Build: auto-generate sub-pages"
          git push
